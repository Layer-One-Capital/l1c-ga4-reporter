name: GA4 Daily Report

on:
  schedule:
    # 11:00 UTC = 7:00 America/New_York (EDT). Mon-Sat only.
    - cron: '0 11 * * 1-6'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch GA4 data
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
        run: python scripts/fetch_ga4.py --mode daily

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: daily GA4 data $(date -u +%Y-%m-%d)"
            git push
          fi
